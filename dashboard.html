<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Obstacle Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
  .card { background: #16213e; border-radius: 20px; padding: 40px; width: 520px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center; }
  h1 { font-size: 22px; color: #aaa; margin-bottom: 25px; letter-spacing: 2px; }
  .status-row { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 20px; }
  .status-ring { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; transition: all 0.3s; border: 5px solid #555; flex-shrink: 0; }
  .status-ring.safe { border-color: #2ecc71; color: #2ecc71; background: rgba(46,204,113,0.08); }
  .status-ring.danger { border-color: #e74c3c; color: #e74c3c; background: rgba(231,76,60,0.08); animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .status-text h2 { font-size: 18px; margin-bottom: 2px; }
  .status-text p { font-size: 13px; color: #888; }
  .chart-wrap { margin: 15px 0; }
  .log-toggle { background: none; border: 1px solid #333; color: #888; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-top: 10px; transition: 0.2s; }
  .log-toggle:hover { border-color: #555; color: #ccc; }
  .log-panel { display: none; background: #0f3460; border-radius: 12px; padding: 15px; max-height: 200px; overflow-y: auto; text-align: left; font-size: 13px; font-family: monospace; margin-top: 8px; }
  .log-panel.open { display: block; }
  .log-panel div { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .log-panel .detected { color: #e74c3c; }
  .log-panel .clear { color: #2ecc71; }
  .conn-status { font-size: 12px; margin-top: 12px; }
  .conn-status.online { color: #2ecc71; }
  .conn-status.offline { color: #e74c3c; }
</style>
</head>
<body>
<div class="card">
  <h1>IR OBSTACLE SENSOR</h1>
  <div class="status-row">
    <div class="status-ring" id="statusRing">—</div>
    <div class="status-text" style="text-align:left">
      <h2 id="statusLabel">Waiting...</h2>
      <p id="statusSub">0 events</p>
    </div>
  </div>
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
  <button class="log-toggle" id="logToggle">▼ Show event log</button>
  <div class="log-panel" id="logPanel"></div>
  <div class="conn-status offline" id="connStatus">● Disconnected</div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
const MINUTES = 15;
const bins = Array(MINUTES).fill(0);
const labels = Array(MINUTES).fill("").map((_, i) => `${-(MINUTES-1-i)}m`);

const ctx = document.getElementById("chart").getContext("2d");
const chart = new Chart(ctx, {
  type: "bar",
  data: {
    labels,
    datasets: [{
      label: "Detections / min",
      data: bins,
      backgroundColor: "rgba(231,76,60,0.5)",
      borderColor: "#e74c3c",
      borderWidth: 1,
      borderRadius: 4,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: {
        ticks: { color: "#888", font: { size: 10 } },
        grid: { color: "rgba(255,255,255,0.05)" }
      },
      y: {
        beginAtZero: true,
        ticks: { color: "#888", font: { size: 10 }, stepSize: 1 },
        grid: { color: "rgba(255,255,255,0.05)" }
      }
    }
  }
});

const ring = document.getElementById("statusRing");
const label = document.getElementById("statusLabel");
const sub = document.getElementById("statusSub");
const logPanel = document.getElementById("logPanel");
const logToggle = document.getElementById("logToggle");
const connStatus = document.getElementById("connStatus");

let totalEvents = 0;
let lastMinute = new Date().getMinutes();
let logOpen = false;

logToggle.addEventListener("click", () => {
  logOpen = !logOpen;
  logPanel.classList.toggle("open", logOpen);
  logToggle.textContent = logOpen ? "▲ Hide event log" : "▼ Show event log";
});

function shiftBins() {
  for (let i = 0; i < MINUTES - 1; i++) bins[i] = bins[i + 1];
  bins[MINUTES - 1] = 0;
}

const clientId = "dashboard_" + Math.random().toString(36).slice(2, 8);
const client = mqtt.connect("wss://792bbe975e73485e87707a342bce20bf.s1.eu.hivemq.cloud:8884/mqtt", {
  clientId,
  username: "arduino_bridge",
  password: "Sathvik7",
  clean: true,
  reconnectPeriod: 5000,
});

client.on("connect", () => {
  connStatus.className = "conn-status online";
  connStatus.textContent = "● Connected";
  client.subscribe("arduino/sensor/#");
});

client.on("close", () => {
  connStatus.className = "conn-status offline";
  connStatus.textContent = "● Disconnected";
  ring.className = "status-ring";
  label.textContent = "Disconnected";
  sub.textContent = "";
});

client.on("message", (topic, payload) => {
  try {
    const data = JSON.parse(payload.toString());
    const raw = data.raw || "";
    const time = new Date(data.timestamp * 1000).toLocaleTimeString();
    const isObstacle = raw.includes("obstacle=yes");
    totalEvents++;

    const now = new Date().getMinutes();
    if (now !== lastMinute) {
      lastMinute = now;
      shiftBins();
    }

    if (isObstacle) {
      bins[MINUTES - 1]++;
      ring.className = "status-ring danger";
      ring.textContent = "⚠";
      label.textContent = "OBSTACLE DETECTED";
      logPanel.innerHTML = `<div class="detected">[${time}] Obstacle detected</div>` + logPanel.innerHTML;
    } else {
      ring.className = "status-ring safe";
      ring.textContent = "✓";
      label.textContent = "ALL CLEAR";
      logPanel.innerHTML = `<div class="clear">[${time}] All clear</div>` + logPanel.innerHTML;
    }

    sub.textContent = `${totalEvents} events · ${bins.reduce((a,b) => a+b, 0)} detections last ${MINUTES}m`;
    chart.update();

    if (logPanel.children.length > 30) logPanel.removeChild(logPanel.lastChild);
  } catch (e) {}
});
</script>
</body>
</html>
